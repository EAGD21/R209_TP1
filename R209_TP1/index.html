<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire de contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <h1>Formulaire de contact</h1>
    </div>
    
    <form action="traitement.php" method="POST">
    
        <div>
            <label for="pseudo">Votre Pseudo *</label>
            <input type="text" id="pseudo" name="user_name" required>
        </div>

        <div>
            <label for="password">Votre Mot de passe *</label>
            <input type="password" id="password" name="user_password" required>
        </div>

        <div>
            <label for="email">Votre e-mail *</label>
            <input type="email" id="email" name="user_email" required>
        </div>

        <div>
            <label for="motif">Objet du Message *</label>
            <select id="motif" name="motif" required>
                <option value="question">J'ai une question</option>
                <option value="suggestion">Je fais une suggestion</option>
                <option value="probleme">Je rencontre un problème</option>
                <option value="Autre">Autre</option>
            </select>
        </div>

        <div>
            <label for="message">Votre message *</label>
            <textarea id="message" name="user_message" rows="5" required></textarea>
        </div>

        <div>
            <fieldset>
                <legend>
                    <p>Niveau d'urgence *</p>
                </legend>
            <input type="radio" id="Urgent" name="Urgence" value="U">
            <label for="Urgent">Urgent</label>

            <input type="radio" id="Normal" name="Urgence" value="N">
            <label for="Normal">Normal</label>

            <input type="radio" id="Lent" name="Urgence" value="L" checked>
            <label for="Lent">Lent</label>
        </fieldset>
            
        </div>

        <div>
            <input type="checkbox" id="politique" name="politique" value="accepte" required>
            <label for="politique">J'ai lu et j'accepte la politique de confidentialité du site.</label>
        </div>

        <div>
            <button type="submit">Envoyer</button>
        </div>
    </form>
</body>
</html>
